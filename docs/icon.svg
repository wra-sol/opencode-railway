<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="brim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>

  <!-- opencode brand mark: dark rounded square with light square outline -->
  <rect x="78" y="150" width="100" height="100" rx="22" fill="#0a0a0b"/>
  <rect x="104" y="176" width="48" height="48" rx="4" fill="none" stroke="#d4d4d8" stroke-width="6"/>

  <!-- wizard hat brim (sits on top of the mark) -->
  <ellipse cx="128" cy="150" rx="78" ry="16" fill="url(#brim)"/>
  <ellipse cx="128" cy="146" rx="78" ry="14" fill="#7c3aed"/>

  <!-- hat cone, tip curved to the right -->
  <path d="M128 146 L92 150 Q70 40 150 22 Q166 20 160 36 Q140 70 128 146 Z" fill="url(#hat)"/>

  <!-- hat band -->
  <path d="M96 148 Q128 156 160 148 L156 138 Q128 146 100 138 Z" fill="#3b0764"/>

  <!-- stars on the hat -->
  <g fill="#fde68a">
    <path d="M118 96 l2 6 6 2 -6 2 -2 6 -2 -6 -6 -2 6 -2 z"/>
    <circle cx="140" cy="60" r="2.5"/>
    <path d="M104 120 l1.5 4.5 4.5 1.5 -4.5 1.5 -1.5 4.5 -1.5 -4.5 -4.5 -1.5 4.5 -1.5 z"/>
  </g>
</svg>
